<!-- _card.html — High Density 'Scout' Style -->
<div class="game-card group neon-border flex outline-none" data-id="{{ jogo.id }}" data-nome="{{ jogo.nome }}" data-capa="{{ url_for('static', filename=jogo.capa_path) }}">
  
  <!-- Image Area -->
  <div class="card-image-container flex-1 relative rounded-[11px] overflow-hidden">
    <img
      src="{{ url_for('static', filename=jogo.capa_path) }}"
      alt="{{ jogo.nome }}"
      onerror="this.src='{{ url_for('static', filename='covers/default.jpg') }}'"
      class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110"
      loading="lazy"
    />
    
    <!-- Scout Overlay (Visible on Hover) -->
    <div class="scout-overlay">
      <div class="scout-actions z-50">
        <!-- Botão Zoom -->
        <button class="btn-scout-mini btn-zoom" title="Ver em tamanho real" onclick="event.preventDefault(); window.openLightbox('{{ jogo.nome }}', '{{ url_for('static', filename=jogo.capa_path) }}')">
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0M10 7v6m3-3H7"/>
          </svg>
        </button>
        <!-- Botão Reload -->
        <button class="btn-scout-mini btn-reload" title="Trocar Imagem" onclick="event.preventDefault(); window.reloadCardImage(this, {{ jogo.id }}, '{{ jogo.nome }}', '{{ jogo.categoria }}')">
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
          </svg>
        </button>
      </div>

      <div class="card-scout-footer">
        <h3 class="card-scout-title">{{ jogo.nome }}</h3>
      </div>
    </div>

    <!-- Details Link (Hidden Click Area) -->
    <a href="{{ url_for('jogo_detail', jogo_id=jogo.id) }}" class="absolute inset-0 z-10"></a>
  </div>

  <!-- List Mode Details (Hidden in Grid) -->
  <div class="card-info-list hidden flex-1 p-4 flex flex-col justify-center">
    <div class="flex items-center justify-between">
      <h3 class="text-lg font-bold text-white">{{ jogo.nome }}</h3>
      <span class="text-brand font-bold">{{ jogo.tamanho }} GB</span>
    </div>
    <div class="flex items-center gap-3 mt-1 text-sm text-gray-400">
      <span class="uppercase tracking-widest text-[10px] bg-white/5 px-2 py-0.5 rounded">{{ jogo.categoria }}</span>
      <span>{{ jogo.plataforma or 'PC' }}</span>
    </div>
  </div>
</div>
