{% extends "base.html" %}
{% block title %}Página não encontrada{% endblock %}

{% block content %}
<div class="min-h-[60vh] flex items-center justify-center px-4 py-20 text-center">
  <div>
    <div class="text-8xl font-black text-brand mb-4">404</div>
    <h1 class="text-2xl font-bold mb-2">Página não encontrada</h1>
    <p class="text-gray-500 mb-8">A página que você procura não existe ou foi removida.</p>
    <a href="{{ url_for('index') }}" class="btn-primary">Voltar ao início</a>
  </div>
</div>
{% endblock %}
